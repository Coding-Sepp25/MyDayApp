<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>MyDay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>MyDay</h1>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <!-- ===== PAGE: HEUTE ===== -->
  <div class="page active" id="page-today">
    <div class="section-title">Aufgaben</div>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Neue Aufgabe...">
      <button class="btn btn-sm" onclick="addTodo()">+</button>
    </div>
    <div id="todoList"></div>

    <div class="section-title" style="margin-top:24px">Was hast du heute gemacht?</div>
    <textarea id="quickNote" placeholder="Schreib hier rein was du heute erlebt oder erledigt hast..."></textarea>
    <button class="btn btn-full" style="margin-top:12px" onclick="saveQuickNote()">Eintrag speichern</button>
  </div>

  <!-- ===== PAGE: NOTIZEN ===== -->
  <div class="page" id="page-notes">
    <div class="section-title">Meine Notizen</div>
    <button class="btn btn-outline btn-full" style="margin-bottom:16px" onclick="openNoteModal()">+ Neue Notiz</button>
    <div id="notesList"></div>
  </div>

  <!-- ===== PAGE: ERINNERUNGEN ===== -->
  <div class="page" id="page-reminders">
    <div class="section-title">Erinnerungen</div>
    <button class="btn btn-outline btn-full" style="margin-bottom:16px" onclick="openReminderModal()">+ Neue Erinnerung</button>
    <div id="reminderList"></div>
  </div>

  <!-- ===== PAGE: VERLAUF ===== -->
  <div class="page" id="page-history">
    <div class="section-title">Deine Woche</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="statTasks">0</div>
        <div class="stat-label">Aufgaben erledigt</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statNotes">0</div>
        <div class="stat-label">Notizen</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statStreak">0</div>
        <div class="stat-label">Tage-Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statReminders">0</div>
        <div class="stat-label">Erinnerungen</div>
      </div>
    </div>
    <div class="section-title">Vergangene Eintraege</div>
    <div id="historyList"></div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('today', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Heute</span>
    </button>
    <button class="nav-item" onclick="switchPage('notes', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Notizen</span>
    </button>
    <button class="nav-item" onclick="switchPage('reminders', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Erinnern</span>
    </button>
    <button class="nav-item" onclick="switchPage('history', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Verlauf</span>
    </button>
  </nav>

  <!-- ===== MODAL: NOTIZ ===== -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal">
      <h2 id="noteModalTitle">Neue Notiz</h2>
      <input type="text" id="noteTitle" placeholder="Titel" style="margin-bottom:12px">
      <textarea id="noteContent" placeholder="Schreib hier deine Notiz..." style="min-height:150px"></textarea>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeNoteModal()">Abbrechen</button>
        <button class="btn" onclick="saveNote()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: ERINNERUNG ===== -->
  <div class="modal-overlay" id="reminderModal">
    <div class="modal">
      <h2>Neue Erinnerung</h2>
      <input type="text" id="reminderText" placeholder="Woran erinnern?" style="margin-bottom:12px">
      <input type="date" id="reminderDate" style="margin-bottom:12px">
      <input type="time" id="reminderTime" style="margin-bottom:12px">
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeReminderModal()">Abbrechen</button>
        <button class="btn" onclick="saveReminder()">Speichern</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
